<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบประเมินภาวะซึมเศร้าในวัยรุ่น (PHQ-A)</title>
    <!-- แก้ไข: ใส่ CDN path ที่ถูกต้อง -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- แก้ไข: ใส่ LIFF SDK path ที่ถูกต้อง -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased text-slate-800">

    <div class="max-w-2xl mx-auto p-4 sm:p-6 bg-white min-h-screen sm:min-h-0 sm:my-8 sm:rounded-2xl sm:shadow-lg border border-slate-100">
        
        <!-- Header -->
        <div class="text-center border-b border-slate-100 pb-5 mb-6">
            <h2 class="text-xl font-bold text-indigo-600">แบบประเมินภาวะซึมเศร้าในวัยรุ่น (PHQ-A)</h2>
            <p class="text-xs text-slate-400 mt-2">คำชี้แจง: ในช่วง 2 สัปดาห์ที่ผ่านมา คุณมีอาการต่อไปนี้บ่อยแค่ไหน?</p>
        </div>
        
        <!-- บล็อกข้อมูลโปรไฟล์ LINE -->
        <div class="flex items-center gap-4 mb-6 p-4 bg-slate-50 rounded-xl border border-slate-100 text-sm">
            <img id="userPicture" class="w-12 h-12 rounded-full ring-2 ring-indigo-100 hidden" src="" alt="Profile">
            <div>
                <p class="font-semibold text-slate-700" id="lineUserName">กำลังโหลดข้อมูลโปรไฟล์...</p>
                <p class="text-xs text-slate-400 truncate max-w-[250px]" id="lineUserId">User ID: -</p>
            </div>
        </div>

        <!-- ฟอร์มกรอกข้อมูล -->
        <form id="phqForm" class="space-y-6">
            
            <!-- ข้อมูลพื้นฐานนักเรียน -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">ชื่อ - นามสกุล นักเรียน</label>
                    <input type="text" id="studentName" required placeholder="ระบุชื่อ-นามสกุล" 
                           class="w-full px-4 py-2 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">อายุ (ปี)</label>
                        <input type="number" id="studentAge" required placeholder="อายุ" 
                               class="w-full px-4 py-2 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">เพศ</label>
                        <select id="studentGender" required class="w-full px-4 py-2 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none">
                            <option value="ชาย">ชาย</option>
                            <option value="หญิง">หญิง</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- ข้อมูลโรงเรียน -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">ชั้น</label>
                    <input type="text" id="studentClass" required placeholder="เช่น ม.3/2"
                           class="w-full px-4 py-2 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">โรงเรียน</label>
                    <input type="text" id="school" required placeholder="ชื่อโรงเรียน"
                           class="w-full px-4 py-2 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none">
                </div>
            </div>

            <!-- เบอร์ผู้ปกครอง -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">เบอร์โทรผู้ปกครอง <span class="text-rose-500">*</span></label>
                <input type="tel" id="parentPhone" required placeholder="เช่น 0812345678" maxlength="10"
                       class="w-full px-4 py-2 rounded-lg border border-slate-200 text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none">
                <p class="text-xs text-slate-400 mt-1">📌 ใช้สำหรับติดต่อกรณีฉุกเฉินเท่านั้น</p>
            </div>

            <!-- ส่วนคำถาม 9 ข้อหลัก -->
            <div class="space-y-5 pt-4 border-t border-slate-100" id="questionsContainer">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">ส่วนที่ 1: แบบประเมินพฤติกรรม 9 ข้อหลัก</p>
            </div>

            <!-- ส่วนคำถามพิเศษ 2 ข้อ -->
            <div class="space-y-4 pt-6 border-t border-slate-100 bg-rose-50/30 p-4 rounded-xl border border-rose-100/50">
                <p class="text-xs font-bold text-rose-500 uppercase tracking-wider">ส่วนที่ 2: คำถามประเมินความเสี่ยงเพิ่มเติม</p>
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">10. ใน 1 เดือนที่ผ่านมา มีช่วงไหนที่คุณมีความคิดอยากตาย หรือไม่อยากมีชีวิตอยู่อย่างจริงจังหรือไม่?</label>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 text-sm"><input type="radio" name="specialQ1" value="true" required class="text-rose-600 focus:ring-rose-500"> ใช่</label>
                        <label class="flex items-center gap-2 text-sm"><input type="radio" name="specialQ1" value="false" class="text-slate-600 focus:ring-slate-500"> ไม่ใช่</label>
                    </div>
                </div>

                <div class="mt-3">
                    <label class="block text-sm font-medium text-slate-700 mb-2">11. ตลอดชีวิตที่ผ่านมา คุณเคยพยายามที่จะทำให้ตัวเองตาย หรือลงมือฆ่าตัวตายหรือไม่?</label>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 text-sm"><input type="radio" name="specialQ2" value="true" required class="text-rose-600 focus:ring-rose-500"> ใช่</label>
                        <label class="flex items-center gap-2 text-sm"><input type="radio" name="specialQ2" value="false" class="text-slate-600 focus:ring-slate-500"> ไม่ใช่</label>
                    </div>
                </div>
            </div>

            <!-- ปุ่มส่งฟอร์ม -->
            <div class="pt-4">
                <button type="submit" id="btnSubmit" class="w-full bg-indigo-600 text-white font-medium py-3 rounded-xl hover:bg-indigo-700 active:scale-[0.99] transition shadow-md disabled:bg-slate-300 disabled:cursor-not-allowed">
                    ส่งข้อมูลประเมิน
                </button>
            </div>
        </form>
    </div>

    <script>
        const LIFF_ID = "2010616371-ze2MMI8U";
        const POWER_AUTOMATE_URL = "https://defaultb81a6357d3c841c38e1fb32946a486.f9.environment.api.powerplatform.com:443/powerautomate/automations/direct/cu/31/workflows/32fbd58230ab4ca69a667cc6af8cb8fd/triggers/manual/paths/invoke?api-version=1";

        let userLineId = "";
        let userDisplayName = "";

        const phqQuestions = [
            "รู้สึกซึม เศร้า หงุดหงิด หรือสิ้นหวัง",
            "เบื่อ ไม่ค่อยสนใจหรือไม่เพลิดเพลิน เวลาทำสิ่งต่างๆ",
            "นอนหลับยาก รู้สึกง่วงทั้งวัน หรือนอนมากเกินไป",
            "ไม่อยากอาหาร น้ำหนักลด หรือกินมากกว่าปกติ",
            "รู้สึกเหนื่อยล้า หรือไม่ค่อยมีพลัง",
            "รู้สึกแย่กับตัวเอง หรือรู้สึกว่าตัวเองล้มเหลว หรือทำให้ตัวเองหรือครอบครัวผิดหวัง",
            "จดจ่อกับสิ่งต่างๆได้ยาก เช่น ทำการบ้าน อ่านหนังสือ หรือดูโทรทัศน์",
            "พูดหรือทำอะไรช้าลงมากจนคนอื่นสังเกตเห็นได้ หรือในทางตรงกันข้ามคือ กระสับกระส่ายหรือกระวนกระวาย จนต้องเคลื่อนไหวไปมามากกว่าปกติ",
            "คิดว่าถ้าตายไปเสียจะดีกว่า หรือคิดจะทำร้ายตัวเองด้วยวิธีใดวิธีหนึ่ง"
        ];

        const container = document.getElementById("questionsContainer");
        phqQuestions.forEach((qText, index) => {
            const qNum = index + 1;
            const qDiv = document.createElement("div");
            qDiv.className = "bg-slate-50/50 p-4 rounded-xl border border-slate-100 space-y-2";
            qDiv.innerHTML = `
                <label class="block text-sm font-medium text-slate-700">${qNum}. ${qText}</label>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 pt-1 text-xs">
                    <label class="flex items-center gap-1.5 p-2 bg-white rounded border border-slate-200 cursor-pointer"><input type="radio" name="q${qNum}" value="0" required> ไม่มีเลย (0)</label>
                    <label class="flex items-center gap-1.5 p-2 bg-white rounded border border-slate-200 cursor-pointer"><input type="radio" name="q${qNum}" value="1"> มีบางวัน (1)</label>
                    <label class="flex items-center gap-1.5 p-2 bg-white rounded border border-slate-200 cursor-pointer"><input type="radio" name="q${qNum}" value="2"> มีมากกว่า 7 วัน (2)</label>
                    <label class="flex items-center gap-1.5 p-2 bg-white rounded border border-slate-200 cursor-pointer"><input type="radio" name="q${qNum}" value="3"> มีแทบทุกวัน (3)</label>
                </div>
            `;
            container.appendChild(qDiv);
        });

        async function initializeLiffApp() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) { getProfileData(); } else { liff.login(); }
            } catch (err) {
                console.error(err);
                document.getElementById("lineUserName").innerText = "ไม่สามารถโหลดโปรไฟล์ได้";
            }
        }

        async function getProfileData() {
            const profile = await liff.getProfile();
            userLineId = profile.userId;
            userDisplayName = profile.displayName;
            document.getElementById("lineUserId").innerText = `User ID: ${profile.userId}`;
            document.getElementById("lineUserName").innerText = profile.displayName;
            if (profile.pictureUrl) {
                const img = document.getElementById("userPicture");
                img.src = profile.pictureUrl;
                img.classList.remove("hidden");
            }
        }

        document.getElementById("phqForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btnSubmit");
            btn.disabled = true;
            btn.innerText = "กำลังส่งข้อมูลประเมิน...";

            let totalScore = 0;
            const answers = {};
            for (let i = 1; i <= 9; i++) {
                const val = parseInt(document.querySelector(`input[name="q${i}"]:checked`).value);
                answers[`q${i}`] = val;
                totalScore += val;
            }

            const q9Score = answers.q9;
            const specialQ1 = document.querySelector('input[name="specialQ1"]:checked').value === "true";
            const specialQ2 = document.querySelector('input[name="specialQ2"]:checked').value === "true";
            const hasRisk = q9Score >= 1 || specialQ1 || specialQ2;
            const needAlert = hasRisk || totalScore >= 10;

            let levelText = "";
            if (totalScore <= 4) levelText = "ไม่มีภาวะซึมเศร้า";
            else if (totalScore <= 9) levelText = "มีภาวะซึมเศร้าเล็กน้อย";
            else if (totalScore <= 14) levelText = "มีภาวะซึมเศร้าปานกลาง";
            else if (totalScore <= 19) levelText = "มีภาวะซึมเศร้ามาก";
            else levelText = "มีภาวะซึมเศร้ารุนแรง";

            const payload = {
                lineUserId: userLineId,
                displayName: userDisplayName,
                studentName: document.getElementById("studentName").value,
                studentAge: document.getElementById("studentAge").value,
                studentGender: document.getElementById("studentGender").value,
                studentClass: document.getElementById("studentClass").value,
                school: document.getElementById("school").value,
                parentPhone: document.getElementById("parentPhone").value,
                totalScore,
                levelText,
                hasRisk,
                needAlert,
                ...answers,
                q10: specialQ1 ? "ใช่" : "ไม่ใช่",
                q11: specialQ2 ? "ใช่" : "ไม่ใช่",
                submittedAt: new Date().toISOString()
            };

            try {
                await fetch(POWER_AUTOMATE_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                btn.innerText = "✅ ส่งข้อมูลเรียบร้อยแล้ว";
                btn.classList.replace("bg-indigo-600", "bg-green-500");
                setTimeout(() => { try { if (liff.isInClient()) liff.closeWindow(); } catch(e){} }, 2000);
            } catch (err) {
                console.error(err);
                btn.disabled = false;
                btn.innerText = "เกิดข้อผิดพลาด กรุณาลองใหม่";
                btn.classList.replace("bg-indigo-600", "bg-red-500");
            }
        });

        initializeLiffApp();
    </script>
</body>
</html>
